# SECURITY: Uses pull_request_target to access PR metadata for title validation.
# Safe because: does not checkout or execute PR code; only reads PR title.
# Reviewed: 2026-03-31 (supply chain hardening)
name: "Lint PR"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  conventional-commits:
    name: Validate PR title and add label
    runs-on: ubuntu-latest
    steps:
      - uses:  ytanikin/pr-conventional-commits@b628c5a234cc32513014b7bfdd1e47b532124d98
        with:
          task_types: '["feat", "fix", "docs", "test", "ci", "refactor", "perf", "chore", "revert", "style", "build"]'
          add_label: 'true'
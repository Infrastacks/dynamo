# SECURITY: Uses pull_request_target so labeler can write PR labels.
# Safe because: actions/labeler reads .github/labeler.yml from the BASE branch
# (not the PR branch), and permissions are scoped to contents:read + pull-requests:write.
# Reviewed: 2026-03-31 (supply chain hardening)
name: Label PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9  # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false
